<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Privacy Policy | JMC</title>
    <style>
        :root { --navy:#102a55; --blue:#2e6eb5; --pale:#edf5fc; --ink:#1d2a3a; --muted:#5e6d7d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif; color: var(--ink); line-height: 1.8; background: #fff; }

        header {
            position: sticky; top: 0; width: 100%;
            background: rgba(255,255,255,0.98);
            border-bottom: 1px solid #eff3f6; z-index: 1000;
        }
        .nav-inner {
            max-width: 1200px; margin: 0 auto; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { text-decoration: none; color: var(--navy); font-weight: 800; font-size: 20px; }
        .logo small { display: block; font-size: 10px; color: var(--muted); letter-spacing: 0.1em; }
        
        /* Matching the main website's button style */
        .lang-switch button {
            padding: 4px 10px; font-size: 11px; border: 1px solid var(--navy);
            background: transparent; cursor: pointer; border-radius: 4px; font-weight: bold;
            margin-left: 4px;
        }
        .lang-switch button.active { background: var(--navy); color: #fff; }

        html[lang="ja"] .en { display: none !important; }
        html[lang="en"] .ja { display: none !important; }

        .content { width: min(860px, 90%); margin: 48px auto 70px; }
        h1 { color: var(--navy); border-bottom: 2px solid var(--pale); padding-bottom: 13px; margin-bottom: 30px; }
        h2 { color: var(--navy); margin-top: 38px; font-size: 21px; }
        a { color: var(--blue); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<header>
    <div class="nav-inner">
        <a href="index.html" class="logo">JMC<small>Japan Medical Concierge</small></a>
        <div class="lang-switch">
            <button onclick="setLang('ja')" id="btn-ja" class="active">JP</button>
            <button onclick="setLang('en')" id="btn-en">EN</button>
        </div>
    </div>
</header>

<div class="content">
    <div class="ja">
        <h1>個人情報保護方針</h1>
        <p>JMCは、ブリティッシュコロンビア州個人情報保護法（BC PIPA）を遵守いたします。</p>
        <!-- Policy details... -->
    </div>
    <div class="en">
        <h1>Privacy Policy</h1>
        <p>JMC complies with the British Columbia Personal Information Protection Act (BC PIPA).</p>
        <!-- Policy details... -->
    </div>
</div>

<script>
    function setLang(l) {
        document.documentElement.lang = l;
        document.getElementById('btn-ja').classList.toggle('active', l === 'ja');
        document.getElementById('btn-en').classList.toggle('active', l === 'en');
    }
    const p = new URLSearchParams(location.search).get('lang');
    setLang(p === 'en' ? 'en' : 'ja');
</script>
</body>
</html>
